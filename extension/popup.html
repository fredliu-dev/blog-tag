<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>API Capture</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      width: 300px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #333;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 16px;
    }
    .info {
      color: #666;
      font-size: 12px;
      margin-bottom: 12px;
      line-height: 1.5;
    }
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    button {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    button.primary {
      background: #1a73e8;
      color: #fff;
    }
    button.secondary {
      background: #f1f3f4;
      color: #333;
    }
    .status {
      margin-top: 12px;
      padding: 8px;
      border-radius: 4px;
      background: #f1f3f4;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <h1>API Capture</h1>

  <div class="info">
    已自动监听 config.json 中配置的接口。
  </div>

  <div class="actions">
    <button id="clear" class="secondary">清空记录</button>
    <button id="export" class="primary">导出</button>
  </div>

  <div class="status" id="status">就绪</div>

  <script src="popup.js"></script>
</body>
</html>
