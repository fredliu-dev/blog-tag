<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog Tag CSV 处理</title>
  <style>
    :root {
      --bg: transparent;
      --card: #1c1c1e;
      --text: #f5f5f7;
      --text-secondary: #8e8e93;
      --border: rgba(255, 255, 255, 0.1);
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.5), 0 10px 30px rgba(0, 0, 0, 0.35), inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      --accent: #0a84ff;
      --accent-soft: rgba(10, 132, 255, 0.12);
      --radius: 22px;
      --radius-sm: 12px;
      --transition: 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      width: 720px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
      font-size: 13px;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      line-height: 1.45;
      overflow: hidden;
    }

    .card {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      background: var(--card);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      padding: 16px;
      width: 100%;
      height: 520px;
      box-sizing: border-box;
      overflow: hidden;
    }

    .left-panel,
    .right-panel {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 0;
    }

    .right-panel {
      flex: 1;
      justify-content: flex-start;
      min-height: 0;
      overflow: hidden;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: 12px;
      margin-bottom: 18px;
      line-height: 1.5;
    }

    .file-section {
      margin-bottom: 16px;
    }

    input[type="file"] {
      display: none;
    }

    .file-label {
      display: block;
      width: 100%;
      padding: 14px;
      border: 1.5px dashed rgba(10, 132, 255, 0.45);
      border-radius: var(--radius-sm);
      text-align: center;
      cursor: pointer;
      color: var(--accent);
      font-size: 13px;
      font-weight: 500;
      background: var(--accent-soft);
      transition: all var(--transition);
    }

    .file-label:hover {
      background: rgba(10, 132, 255, 0.18);
      border-color: rgba(10, 132, 255, 0.65);
      transform: translateY(-1px);
    }

    .file-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: rgba(255, 255, 255, 0.05);
      transition: all var(--transition);
    }

    .file-card:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .file-card .file-info {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .file-card .file-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #ff453a, #ff6b6b);
      color: #fff;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 700;
      flex-shrink: 0;
      box-shadow: 0 2px 6px rgba(255, 69, 58, 0.25);
    }

    .file-card .file-name {
      font-size: 13px;
      color: var(--text);
      word-break: break-all;
      font-weight: 500;
    }

    .file-card .remove-btn {
      background: rgba(255, 255, 255, 0.07);
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      padding: 6px 10px;
      border-radius: 8px;
      flex-shrink: 0;
      transition: all var(--transition);
      margin-left: 8px;
    }

    .file-card .remove-btn:hover {
      background: rgba(255, 69, 58, 0.15);
      color: #ff453a;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    .actions-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .parallel-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .parallel-spinner {
      flex: 1;
      display: flex;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.08);
    }

    .parallel-btn {
      width: 36px;
      height: 36px;
      border: none;
      background: transparent;
      color: var(--text);
      font-size: 18px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease;
    }

    .parallel-btn:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.1);
    }

    .parallel-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .parallel-input {
      flex: 1;
      height: 36px;
      border: none;
      background: transparent;
      color: var(--text);
      font-size: 14px;
      font-weight: 500;
      text-align: center;
      outline: none;
      -moz-appearance: textfield;
      appearance: textfield;
    }

    .parallel-input::-webkit-outer-spin-button,
    .parallel-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .parallel-input:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .parallel-unit {
      font-size: 13px;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    .actions:last-of-type {
      margin-bottom: 0;
    }

    button {
      padding: 10px 12px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -0.2px;
      transition: all var(--transition);
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border: 1px solid var(--border);
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08);
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.25);
      background: rgba(255, 255, 255, 0.12);
    }

    button:active:not(:disabled) {
      transform: scale(0.98);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
      filter: grayscale(0.35);
    }

    button.primary {
      background: var(--accent);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 2px 10px rgba(10, 132, 255, 0.35);
    }

    button.primary:disabled {
      background: rgba(10, 132, 255, 0.25);
      color: rgba(255, 255, 255, 0.55);
    }

    button.primary:hover:not(:disabled) {
      background: #409cff;
      box-shadow: 0 4px 16px rgba(10, 132, 255, 0.45);
    }

    button.match {
      background: rgba(255, 159, 10, 0.12);
      color: #ffb340;
      border-color: rgba(255, 159, 10, 0.2);
    }

    button.match:disabled {
      background: rgba(255, 159, 10, 0.06);
      color: rgba(255, 179, 64, 0.55);
    }

    button.match:hover:not(:disabled) {
      background: rgba(255, 159, 10, 0.2);
      border-color: rgba(255, 159, 10, 0.35);
    }

    button.export {
      background: rgba(175, 82, 222, 0.12);
      color: #da8fff;
      border-color: rgba(175, 82, 222, 0.2);
    }

    button.export:disabled {
      background: rgba(175, 82, 222, 0.06);
      color: rgba(218, 143, 255, 0.55);
    }

    button.export:hover:not(:disabled) {
      background: rgba(175, 82, 222, 0.2);
      border-color: rgba(175, 82, 222, 0.35);
    }

    button.tag {
      background: rgba(48, 209, 88, 0.12);
      color: #5ce75c;
      border-color: rgba(48, 209, 88, 0.2);
    }

    button.tag:disabled {
      background: rgba(48, 209, 88, 0.06);
      color: rgba(92, 231, 92, 0.55);
    }

    button.tag:hover:not(:disabled) {
      background: rgba(48, 209, 88, 0.2);
      border-color: rgba(48, 209, 88, 0.35);
    }

    button.danger {
      background: rgba(255, 69, 58, 0.08);
      color: #ff453a;
      border-color: rgba(255, 69, 58, 0.18);
    }

    button.danger:disabled {
      background: rgba(255, 69, 58, 0.05);
      color: rgba(255, 69, 58, 0.45);
    }

    button.danger:hover:not(:disabled) {
      background: rgba(255, 69, 58, 0.15);
      border-color: rgba(255, 69, 58, 0.3);
    }

    .actions:has(only-child) {
      grid-template-columns: 1fr;
    }

    .progress {
      margin-top: 16px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 100px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #0a84ff, #64d2ff);
      border-radius: 100px;
      transition: width 0.3s ease;
    }

    .progress-segment {
      height: 100%;
      float: left;
    }

    .progress-segment.success {
      background: #30d158;
    }

    .progress-segment.fail {
      background: #ff453a;
    }

    .progress-segment.pending {
      background: rgba(255, 255, 255, 0.08);
    }

    .progress-text {
      margin-top: 8px;
      font-size: 12px;
      color: var(--text-secondary);
      text-align: right;
      font-weight: 500;
    }

    .status {
      flex: 1;
      display: flex;
      flex-direction: column;
      margin-top: 0;
      padding: 14px;
      border-radius: var(--radius-sm);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      font-size: 12px;
      min-height: 0;
      justify-content: flex-start;
      overflow: hidden;
    }

    .status-empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      text-align: center;
      font-size: 13px;
      line-height: 1.6;
    }

    .status-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .status-step {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      background: var(--text-secondary);
      letter-spacing: 0.2px;
      flex-shrink: 0;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.12);
    }

    .status-step.idle {
      background: #636366;
    }

    .status-step.capture {
      background: #ff9f0a;
    }

    .status-step.process {
      background: var(--accent);
    }

    .status-step.success,
    .status-step.done {
      background: #30d158;
    }

    .status-step.process-csv {
      background: #0a84ff;
    }

    .status-step.match-id {
      background: #ff9f0a;
    }

    .status-step.tagging,
    .status-step.retry {
      background: #30d158;
    }

    .status-title {
      flex: 1;
      font-size: 13px;
      color: var(--text);
      word-break: break-all;
      font-weight: 500;
    }

    .worker-list {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 10px;
      min-height: 0;
      overflow-y: auto;
    }

    .worker-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.04);
      padding: 6px 10px;
      border-radius: 8px;
      line-height: 1.4;
    }

    .worker-progress {
      margin-left: 8px;
      color: var(--text-secondary);
      font-weight: 600;
      font-size: 11px;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="left-panel">
      <h1>Blog Tag CSV 处理</h1>

      <div class="subtitle">
        选择包含 URL 列的 CSV 文件，插件将提取 URL 路径最后两段作为 blog_title 和 Title 写入新文件，然后访问 Shopify 后台匹配文章 ID，最后给文章打上对应的标签。
      </div>

      <div class="file-section">
        <label for="csvFile" id="fileLabel" class="file-label">选择 CSV 文件</label>
        <input type="file" id="csvFile" accept=".csv" />

        <div id="fileCard" class="file-card" style="display: none;">
          <div class="file-info">
            <div class="file-icon">CSV</div>
            <div class="file-name" id="fileName"></div>
          </div>
          <button id="removeFile" class="remove-btn" type="button">删除</button>
        </div>
      </div>

      <div class="actions-row">
        <button id="match" class="match" disabled style="flex:1;">匹配 ID</button>
      </div>

      <div class="actions">
        <button id="export" class="export" disabled>导出 CSV</button>
        <button id="tag" class="tag" disabled>打标签</button>
      </div>

      <div class="actions-row parallel-row">
        <div class="parallel-spinner">
          <button id="parallelDec" class="parallel-btn" type="button" disabled>−</button>
          <input id="parallelCount" class="parallel-input" type="number" min="1" value="1" disabled />
          <button id="parallelInc" class="parallel-btn" type="button" disabled>+</button>
        </div>
        <span class="parallel-unit">个标签页</span>
      </div>

      <div class="actions" style="grid-template-columns: 1fr;">
        <button id="stop" class="danger" disabled>停止</button>
      </div>
    </div>

    <div class="right-panel">
      <div class="progress" id="progressContainer" style="display: none;">
        <div class="progress-bar" id="progressBar"></div>
        <div class="progress-text" id="progressText">0 / 0</div>
      </div>

      <div class="status" id="status">
        <div class="status-empty" id="statusEmpty" style="display: none;">
          右侧将显示任务进度与 worker 状态
        </div>
        <div class="status-header" id="statusHeader">
          <div class="status-step idle" id="statusStep">就绪</div>
          <div class="status-title" id="statusTitle">请选择 CSV 文件</div>
        </div>
        <div class="worker-list" id="workerList"></div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
